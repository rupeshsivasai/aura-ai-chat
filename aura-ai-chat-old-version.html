<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AuraAI — Intelligent Assistant</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --surface2: #18181f;
    --border: rgba(255,255,255,0.07);
    --border-bright: rgba(255,255,255,0.14);
    --accent: #00c9a7;
    --accent-glow: rgba(0,201,167,0.18);
    --accent-dim: rgba(0,201,167,0.08);
    --user-bubble: #0d1f1c;
    --ai-bubble: #131318;
    --text: #e8e6f0;
    --text-dim: rgba(232,230,240,0.5);
    --text-faint: rgba(232,230,240,0.28);
    --danger: #f06b6b;
    --success: #5ecfa0;
    --font-display: 'DM Serif Display', serif;
    --font-body: 'Instrument Sans', sans-serif;
    --font-mono: 'DM Mono', monospace;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    font-size: 15px;
    line-height: 1.6;
    overflow: hidden;
  }

  /* Subtle grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,201,167,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,201,167,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  #app {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    height: 100vh;
    max-width: 820px;
    margin: 0 auto;
  }

  /* ── Header ── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 28px;
    border-bottom: 1px solid var(--border);
    backdrop-filter: blur(12px);
    background: rgba(10,10,15,0.8);
    flex-shrink: 0;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo-mark {
    width: 34px; height: 34px;
    border-radius: 10px;
    background: var(--accent-dim);
    border: 1px solid rgba(124,106,247,0.3);
    display: flex; align-items: center; justify-content: center;
    position: relative;
    overflow: hidden;
  }

  .logo-mark::after {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at 60% 40%, rgba(0,201,167,0.4), transparent 70%);
  }

  .logo-mark svg { position: relative; z-index: 1; }

  .logo-text {
    font-family: var(--font-display);
    font-size: 20px;
    letter-spacing: -0.01em;
    color: var(--text);
  }

  .logo-text span { color: var(--accent); font-style: italic; }

  .header-status {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    color: var(--text-dim);
    font-family: var(--font-mono);
  }

  .status-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--success);
    box-shadow: 0 0 6px var(--success);
    animation: pulse 2.5s ease-in-out infinite;
  }

  .status-dot.offline { background: var(--danger); box-shadow: 0 0 6px var(--danger); animation: none; }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  /* ── API Key Banner ── */
  #api-banner {
    margin: 16px 28px 0;
    padding: 14px 18px;
    background: var(--surface);
    border: 1px solid var(--border-bright);
    border-radius: 12px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
  }

  #api-banner.hidden { display: none; }

  .banner-icon {
    width: 32px; height: 32px;
    border-radius: 8px;
    background: rgba(0,201,167,0.1);
    border: 1px solid rgba(0,201,167,0.2);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    color: var(--accent);
    font-size: 15px;
  }

  .banner-label {
    font-size: 12px;
    color: var(--text-dim);
    margin-bottom: 4px;
    font-family: var(--font-mono);
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  .banner-input-row {
    display: flex;
    gap: 8px;
    flex: 1;
  }

  #api-key-input {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border-bright);
    border-radius: 8px;
    padding: 8px 12px;
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 13px;
    outline: none;
    transition: border-color 0.2s;
  }

  #api-key-input:focus { border-color: var(--accent); }
  #api-key-input::placeholder { color: var(--text-faint); }

  #save-key-btn {
    padding: 8px 16px;
    background: var(--accent);
    border: none;
    border-radius: 8px;
    color: #fff;
    font-family: var(--font-body);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
    white-space: nowrap;
  }

  #save-key-btn:hover { opacity: 0.88; }
  #save-key-btn:active { transform: scale(0.97); }

  /* ── Messages ── */
  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 24px 28px;
    display: flex;
    flex-direction: column;
    gap: 20px;
    scroll-behavior: smooth;
  }

  #messages::-webkit-scrollbar { width: 4px; }
  #messages::-webkit-scrollbar-track { background: transparent; }
  #messages::-webkit-scrollbar-thumb { background: var(--border-bright); border-radius: 4px; }

  /* Empty state */
  #empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    text-align: center;
    padding: 40px;
    opacity: 0.6;
  }

  #empty-state.hidden { display: none; }

  .empty-icon {
    font-size: 40px;
    margin-bottom: 4px;
    filter: grayscale(0.3);
  }

  .empty-title {
    font-family: var(--font-display);
    font-size: 22px;
    color: var(--text);
  }

  .empty-sub {
    font-size: 14px;
    color: var(--text-dim);
    max-width: 320px;
  }

  .suggestion-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    margin-top: 8px;
  }

  .chip {
    padding: 7px 14px;
    background: var(--surface);
    border: 1px solid var(--border-bright);
    border-radius: 20px;
    font-size: 13px;
    color: var(--text-dim);
    cursor: pointer;
    transition: all 0.2s;
  }

  .chip:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: var(--accent-dim);
  }

  /* Message rows */
  .msg-row {
    display: flex;
    gap: 12px;
    animation: slideIn 0.3s cubic-bezier(0.16, 1, 0.3, 1);
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .msg-row.user { flex-direction: row-reverse; }

  .avatar {
    width: 34px; height: 34px;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
    flex-shrink: 0;
    margin-top: 2px;
    font-weight: 600;
  }

  .msg-row.user .avatar {
    background: rgba(0,201,167,0.1);
    border: 1px solid rgba(0,201,167,0.25);
    color: var(--accent);
  }

  .msg-row.assistant .avatar {
    background: rgba(94,207,160,0.08);
    border: 1px solid rgba(94,207,160,0.2);
    color: var(--success);
    font-size: 16px;
  }

  .msg-content { max-width: calc(100% - 50px); }

  .msg-bubble {
    padding: 12px 16px;
    border-radius: 14px;
    font-size: 14.5px;
    line-height: 1.7;
    white-space: pre-wrap;
    word-break: break-word;
  }

  .msg-row.user .msg-bubble {
    background: var(--user-bubble);
    border: 1px solid rgba(0,201,167,0.15);
    border-top-right-radius: 4px;
    color: var(--text);
  }

  .msg-row.assistant .msg-bubble {
    background: var(--ai-bubble);
    border: 1px solid var(--border);
    border-top-left-radius: 4px;
    color: var(--text);
  }

  .msg-row.assistant .msg-bubble.error {
    border-color: rgba(240,107,107,0.2);
    background: rgba(240,107,107,0.04);
    color: var(--danger);
  }

  .msg-meta {
    font-size: 11px;
    color: var(--text-faint);
    margin-top: 5px;
    font-family: var(--font-mono);
    padding: 0 4px;
  }

  .msg-row.user .msg-meta { text-align: right; }

  /* Typing indicator */
  .typing-bubble {
    display: flex;
    gap: 5px;
    align-items: center;
    padding: 14px 18px;
    background: var(--ai-bubble);
    border: 1px solid var(--border);
    border-radius: 14px;
    border-top-left-radius: 4px;
    width: fit-content;
  }

  .typing-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--text-dim);
    animation: typingBounce 1.4s ease-in-out infinite;
  }

  .typing-dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes typingBounce {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.3; }
    30% { transform: translateY(-5px); opacity: 1; }
  }

  /* ── Input Area ── */
  #input-area {
    padding: 16px 28px 22px;
    border-top: 1px solid var(--border);
    flex-shrink: 0;
    background: rgba(10,10,15,0.9);
    backdrop-filter: blur(12px);
  }

  .input-wrapper {
    display: flex;
    align-items: flex-end;
    gap: 10px;
    background: var(--surface);
    border: 1px solid var(--border-bright);
    border-radius: 14px;
    padding: 10px 12px;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  .input-wrapper:focus-within {
    border-color: rgba(0,201,167,0.4);
    box-shadow: 0 0 0 3px var(--accent-glow);
  }

  #user-input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: var(--font-body);
    font-size: 14.5px;
    line-height: 1.6;
    resize: none;
    max-height: 120px;
    min-height: 24px;
    padding: 2px 0;
  }

  #user-input::placeholder { color: var(--text-faint); }

  .input-actions {
    display: flex;
    align-items: center;
    gap: 6px;
    flex-shrink: 0;
  }

  #model-select {
    background: var(--bg);
    border: 1px solid var(--border-bright);
    border-radius: 8px;
    color: var(--text-dim);
    font-family: var(--font-mono);
    font-size: 11px;
    padding: 5px 8px;
    outline: none;
    cursor: pointer;
    transition: border-color 0.2s;
  }

  #model-select:focus { border-color: var(--accent); }
  #model-select option { background: var(--surface); }

  #send-btn {
    width: 36px; height: 36px;
    border-radius: 9px;
    background: var(--accent);
    border: none;
    color: #fff;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: opacity 0.2s, transform 0.1s;
    flex-shrink: 0;
  }

  #send-btn:hover { opacity: 0.85; }
  #send-btn:active { transform: scale(0.93); }
  #send-btn:disabled { opacity: 0.3; cursor: not-allowed; }

  .input-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 8px;
    padding: 0 2px;
  }

  .input-hint {
    font-size: 11px;
    color: var(--text-faint);
    font-family: var(--font-mono);
  }

  #clear-btn {
    font-size: 11px;
    color: var(--text-faint);
    background: none;
    border: none;
    cursor: pointer;
    font-family: var(--font-mono);
    transition: color 0.2s;
    padding: 2px 4px;
  }

  #clear-btn:hover { color: var(--danger); }

  /* Markdown-like formatting */
  .msg-bubble code {
    font-family: var(--font-mono);
    font-size: 13px;
    background: rgba(255,255,255,0.06);
    border: 1px solid var(--border-bright);
    border-radius: 4px;
    padding: 1px 5px;
  }

  .msg-bubble strong { font-weight: 600; color: #fff; }
</style>
</head>
<body>

<div id="app">
  <header>
    <div class="logo">
      <div class="logo-mark">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
          <circle cx="9" cy="9" r="3" fill="#00c9a7"/>
          <circle cx="9" cy="3" r="1.5" fill="#00c9a7" opacity="0.5"/>
          <circle cx="9" cy="15" r="1.5" fill="#00c9a7" opacity="0.5"/>
          <circle cx="3" cy="9" r="1.5" fill="#00c9a7" opacity="0.5"/>
          <circle cx="15" cy="9" r="1.5" fill="#00c9a7" opacity="0.5"/>
        </svg>
      </div>
      <span class="logo-text">Aura<span>AI</span></span>
    </div>
    <div class="header-status">
      <span class="status-dot" id="status-dot"></span>
      <span id="status-text">ready</span>
    </div>
  </header>

  <div id="api-banner">
    <div class="banner-icon">🔑</div>
    <div style="flex:1;">
      <div class="banner-label">OpenAI API Key</div>
      <div class="banner-input-row">
        <input type="password" id="api-key-input" placeholder="sk-..." autocomplete="off" />
        <button id="save-key-btn">Connect</button>
      </div>
    </div>
  </div>

  <div id="messages">
    <div id="empty-state">
      <div class="empty-icon">✦</div>
      <div class="empty-title">What can I help with?</div>
      <div class="empty-sub">Powered by OpenAI GPT. Add your API key above to start.</div>
      <div class="suggestion-chips">
        <div class="chip" onclick="useSuggestion(this)">Explain quantum computing</div>
        <div class="chip" onclick="useSuggestion(this)">Write a Python function</div>
        <div class="chip" onclick="useSuggestion(this)">Summarize a topic</div>
        <div class="chip" onclick="useSuggestion(this)">Help me brainstorm</div>
      </div>
    </div>
  </div>

  <div id="input-area">
    <div class="input-wrapper">
      <textarea id="user-input" rows="1" placeholder="Send a message…"></textarea>
      <div class="input-actions">
        <select id="model-select">
          <option value="gpt-4o">gpt-4o</option>
          <option value="gpt-4o-mini">gpt-4o-mini</option>
          <option value="gpt-4-turbo">gpt-4-turbo</option>
          <option value="gpt-3.5-turbo">gpt-3.5-turbo</option>
        </select>
        <button id="send-btn" disabled title="Send">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <path d="M14 8L2 2l2.5 6L2 14l12-6z" fill="white"/>
          </svg>
        </button>
      </div>
    </div>
    <div class="input-footer">
      <span class="input-hint">Enter to send · Shift+Enter for newline</span>
      <div style="display:flex;align-items:center;gap:10px;">
        <span style="font-size:11px;color:var(--text-faint);font-family:var(--font-mono);display:flex;align-items:center;gap:5px;">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" style="opacity:0.5"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 14H9V8h2v8zm4 0h-2V8h2v8z" fill="currentColor"/></svg>
          Built with <a href="https://claude.ai" target="_blank" style="color:var(--accent);text-decoration:none;font-weight:500;">Claude AI</a>
        </span>
        <button id="clear-btn">Clear chat</button>
      </div>
    </div>
  </div>
</div>

<script>
  let apiKey = localStorage.getItem('aura_openai_key') || '';
  let messages = [];
  let isLoading = false;

  const apiKeyInput = document.getElementById('api-key-input');
  const saveKeyBtn = document.getElementById('save-key-btn');
  const apiBanner = document.getElementById('api-banner');
  const messagesEl = document.getElementById('messages');
  const emptyState = document.getElementById('empty-state');
  const userInput = document.getElementById('user-input');
  const sendBtn = document.getElementById('send-btn');
  const modelSelect = document.getElementById('model-select');
  const statusDot = document.getElementById('status-dot');
  const statusText = document.getElementById('status-text');
  const clearBtn = document.getElementById('clear-btn');

  function init() {
    if (apiKey) {
      apiBanner.classList.add('hidden');
      sendBtn.disabled = false;
      setStatus('ready', false);
    } else {
      setStatus('no key', true);
    }
  }

  function setStatus(text, offline = false) {
    statusText.textContent = text;
    statusDot.className = 'status-dot' + (offline ? ' offline' : '');
  }

  saveKeyBtn.addEventListener('click', () => {
    const val = apiKeyInput.value.trim();
    if (!val.startsWith('sk-')) {
      apiKeyInput.style.borderColor = 'var(--danger)';
      setTimeout(() => apiKeyInput.style.borderColor = '', 1500);
      return;
    }
    apiKey = val;
    localStorage.setItem('aura_openai_key', apiKey);
    apiBanner.classList.add('hidden');
    sendBtn.disabled = false;
    setStatus('connected', false);
    setTimeout(() => setStatus('ready', false), 2000);
  });

  apiKeyInput.addEventListener('keydown', e => {
    if (e.key === 'Enter') saveKeyBtn.click();
  });

  function useSuggestion(el) {
    userInput.value = el.textContent;
    autoResize();
    userInput.focus();
  }

  function autoResize() {
    userInput.style.height = 'auto';
    userInput.style.height = Math.min(userInput.scrollHeight, 120) + 'px';
  }

  userInput.addEventListener('input', autoResize);

  userInput.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      if (!sendBtn.disabled) sendMessage();
    }
  });

  sendBtn.addEventListener('click', sendMessage);

  clearBtn.addEventListener('click', () => {
    messages = [];
    const rows = messagesEl.querySelectorAll('.msg-row');
    rows.forEach(r => r.remove());
    emptyState.classList.remove('hidden');
  });

  function formatTime() {
    return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  }

  function appendMessage(role, content, isError = false) {
    emptyState.classList.add('hidden');

    const row = document.createElement('div');
    row.className = `msg-row ${role}`;

    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.textContent = role === 'user' ? 'U' : '✦';

    const msgContent = document.createElement('div');
    msgContent.className = 'msg-content';

    const bubble = document.createElement('div');
    bubble.className = 'msg-bubble' + (isError ? ' error' : '');
    bubble.textContent = content;

    const meta = document.createElement('div');
    meta.className = 'msg-meta';
    meta.textContent = formatTime();

    msgContent.appendChild(bubble);
    msgContent.appendChild(meta);
    row.appendChild(avatar);
    row.appendChild(msgContent);
    messagesEl.appendChild(row);
    scrollToBottom();
    return bubble;
  }

  function appendTyping() {
    emptyState.classList.add('hidden');
    const row = document.createElement('div');
    row.className = 'msg-row assistant';
    row.id = 'typing-row';

    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.textContent = '✦';

    const bubble = document.createElement('div');
    bubble.className = 'typing-bubble';
    for (let i = 0; i < 3; i++) {
      const dot = document.createElement('div');
      dot.className = 'typing-dot';
      bubble.appendChild(dot);
    }

    row.appendChild(avatar);
    row.appendChild(bubble);
    messagesEl.appendChild(row);
    scrollToBottom();
  }

  function removeTyping() {
    const row = document.getElementById('typing-row');
    if (row) row.remove();
  }

  function scrollToBottom() {
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  async function sendMessage() {
    const text = userInput.value.trim();
    if (!text || isLoading) return;
    if (!apiKey) {
      apiBanner.classList.remove('hidden');
      apiKeyInput.focus();
      return;
    }

    userInput.value = '';
    autoResize();
    isLoading = true;
    sendBtn.disabled = true;
    setStatus('thinking…', false);

    messages.push({ role: 'user', content: text });
    appendMessage('user', text);
    appendTyping();

    try {
      const res = await fetch('https://api.openai.com/v1/chat/completions', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${apiKey}`
        },
        body: JSON.stringify({
          model: modelSelect.value,
          messages: [
            { role: 'system', content: 'You are a helpful, knowledgeable AI assistant. Be concise and clear.' },
            ...messages
          ],
          max_tokens: 1500,
          temperature: 0.7
        })
      });

      const data = await res.json();

      if (!res.ok) {
        throw new Error(data.error?.message || `API error ${res.status}`);
      }

      const reply = data.choices[0].message.content;
      messages.push({ role: 'assistant', content: reply });
      removeTyping();
      appendMessage('assistant', reply);
      setStatus(`${modelSelect.value}`, false);
      setTimeout(() => setStatus('ready', false), 3000);

    } catch (err) {
      removeTyping();
      const errMsg = err.message.includes('401')
        ? 'Invalid API key. Please check and reconnect.'
        : err.message.includes('429')
        ? 'Rate limit reached. Please wait a moment.'
        : `Error: ${err.message}`;
      appendMessage('assistant', errMsg, true);
      setStatus('error', true);
      setTimeout(() => setStatus('ready', false), 4000);
    } finally {
      isLoading = false;
      sendBtn.disabled = false;
      userInput.focus();
    }
  }

  init();
</script>
</body>
</html>
